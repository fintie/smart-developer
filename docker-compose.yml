services:
  postgres:
    image: postgres:16
    container_name: smart-developer-postgres
    environment:
      POSTGRES_DB: smart_developer
      POSTGRES_USER: smart_dev
      POSTGRES_PASSWORD: smart_dev_password
    ports:
      - "55435:5432"
    volumes:
      - smart_developer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_dev -d smart_developer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smart_developer_pgdata: