defaults:
  model:
    encoder_name: "sentence-transformers/all-MiniLM-L6-v2"
    embedding_dim: 384
    projection_dim: 256
    dropout: 0.1
    normalize: true
    share_tower_weights: true

  data:
    train_pairs_path: "data/processed/retrieval/training_pairs.parquet"
    candidate_sites_path: "data/processed/retrieval/candidate_sites.parquet"
    query_path: "data/processed/retrieval/query_intents.jsonl"
    query_text_col: "query_text"
    candidate_text_col: "candidate_text_clean"
    label_col: "label"
    pair_type_col: "pair_type"
    strategy_col: "strategy"
    max_text_length: 128

  training:
    learning_rate: 2.0e-5
    weight_decay: 0.01
    warmup_ratio: 0.1
    gradient_clip_norm: 1.0
    seed: 42
    num_workers: 0
    device: "auto"
    mixed_precision: false

  evaluation:
    top_k: [10, 20, 50]

experiments:
  two_tower_v1:
    model:
      name: "two_tower_v1"
      dropout: 0.15
    training:
      batch_size: 32
      epochs: 5
      learning_rate: 1.0e-5
      warmup_ratio: 0.15
    loss:
      name: "multiple_negatives"
      temperature: 0.07
    output:
      model_dir: "algorithm/artifacts/models/two_tower_v1"
      metrics_path: "algorithm/artifacts/models/two_tower_v1/metrics.json"

  two_tower_v2:
    model:
      name: "two_tower_v2"
    training:
      batch_size: 32
      epochs: 3
    loss:
      name: "triplet_margin"
      temperature: 0.05
      margin: 0.2
    sampling:
      positives_per_query: 200
      hard_negatives_per_query: 200
      random_negatives_per_query: 200
      prefer_hard_negatives: true
    output:
      model_dir: "algorithm/artifacts/models/two_tower_v2"
      metrics_path: "algorithm/artifacts/models/two_tower_v2/metrics.json"